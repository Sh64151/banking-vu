name: DevSecOps Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Global default: all jobs read-only unless overridden
permissions:
  contents: read

jobs:

  # ── Job 1: Verify the repo can be checked out ──
  build:
    name: Build Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Confirm build environment
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Triggered by: ${{ github.actor }}"

  # ── Job 2: SAST placeholder (CodeQL comes next phase) ──
  sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript, python
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:javascript /language:python"

  # ── Job 3: Secrets scan placeholder ──
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Secrets scan placeholder
        run: echo "Gitleaks will run here - Phase 6"

  # ── Job 4: DAST placeholder ──
  dast:
    name: DAST Scan
    runs-on: ubuntu-latest
    needs: sast
    permissions:
      contents: read
    steps:
      - name: DAST placeholder
        run: echo "ZAP will run here - Phase 7"